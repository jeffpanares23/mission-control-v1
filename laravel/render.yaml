# Mission Control V1 — Laravel Backend
# Render.com PHP/Laravel deployment config

services:
  - type: web
    name: mission-control-api
    env: php
    region: oregon
    plan: free
    buildCommand: |
      composer install --no-interaction --prefer-dist
      php artisan key:generate --force
      php artisan config:clear
    startCommand: |
      php artisan serve --port 10000 --host 0.0.0.0
    healthCheckPath: /api/up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://frontend-xi-ten-77.vercel.app
